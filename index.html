<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Vaccinar - TI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loginOverlay" class="overlay">
        <div class="login-box">
            <h2>Acesso Restrito</h2>
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnLogin">Entrar</button>
        </div>
    </div>

    <div id="appContent" style="display:none;">
        <header>
            <div class="header-top">
                <h1>Painel de Lançamentos TI</h1>
                <button id="btnLogout" class="btn-logout">Sair</button>
            </div>
            
            <div class="filtros">
                <select id="mesFiltro">
                    <option value="ABRIL/2026">ABRIL/2026</option>
                    <option value="MAIO/2026">MAIO/2026</option>
                </select>
                <select id="filtroLocal">
                    <option value="TODOS">TODAS FILIAIS</option>
                    <option value="MATRIZ">MATRIZ</option>
                    <option value="ARAGUAINA">ARAGUAINA</option>
                    <option value="GOIANIRA">GOIANIRA</option>
                    <option value="BOM DESPACHO">BOM DESPACHO</option>
                    <option value="TOLEDO">TOLEDO</option>
                    <option value="PINHAIS">PINHAIS</option>
                </select>
                <input type="file" id="csvInput" accept=".csv" style="display:none;">
                <button onclick="document.getElementById('csvInput').click()" class="btn-import">Importar CSV</button>
            </div>
        </header>

        <main>
            <div class="cards">
                <div class="card">
                    <h3>Pendente</h3>
                    <p id="totalPendente">R$ 0,00</p>
                </div>
                <div class="card card-green">
                    <h3>Enviado ao CSC</h3>
                    <p id="totalEnviado">R$ 0,00</p>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Filial</th>
                            <th>Nº PC</th>
                            <th>Fornecedor</th>
                            <th>C. Custos</th>
                            <th style="text-align:right">Valor</th>
                            <th>Vencimento</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaServico"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="modalTratar" class="modal">
        <div class="modal-content">
            <h3>Texto para Lançamento</h3>
            <pre id="modalPreview"></pre>
            <div class="modal-actions">
                <button id="btnCopiarMarcar" class="btn-import">Copiar e Marcar Enviado</button>
                <button onclick="document.getElementById('modalTratar').style.display='none'">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
