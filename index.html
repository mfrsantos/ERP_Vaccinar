<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP VACCINAR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loginOverlay" style="display:none;">
        <div class="login-box">
            <h2>ERP LOGIN</h2>
            <input id="loginEmail" type="email" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnLogin">ENTRAR</button>
        </div>
    </div>

    <div id="modalTratar" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 style="color: #10b981; margin-top: 0;">Tratar Lançamento</h3>
            <div id="modalPreview" class="preview-box"></div>
            <div class="modal-buttons-stack">
                <button id="btnAcaoPrincipal" class="btn-primary">COPIAR TEXTO / ENVIAR</button>
                <button id="btnApenasMarcar" class="btn-secondary">APENAS MARCAR COMO ENVIADO</button>
                <button onclick="fecharModal()" class="btn-outline">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="appContent">
        <header class="main-header">
            <h1>ERP - VACCINAR</h1>
            <button id="btnLogout" class="btn-sair">SAIR</button>
        </header>

        <div class="grid-resumo">
            <div class="card-v37 orange"><h3>NOTAS ENVIADAS</h3><p id="progressoNotas">0 / 0</p></div>
            <div class="card-v37 red"><h3>TOTAL PENDENTE</h3><p id="totalPendente">R$ 0,00</p></div>
            <div class="card-v37 green"><h3>TOTAL NO CSC</h3><p id="totalPago">R$ 0,00</p></div>
            <div class="card-v37 blue"><h3>TOTAL GERAL</h3><p id="totalGeral">R$ 0,00</p></div>
        </div>

        <div class="area-lançamento">
            <div class="filtros-topo">
                <select id="mesFiltro">
                    <option value="01">JANEIRO</option><option value="02">FEVEREIRO</option>
                    <option value="03">MARÇO</option><option value="04" selected>ABRIL</option>
                    <option value="05">MAIO</option><option value="06">JUNHO</option>
                    <option value="07">JULHO</option><option value="08">AGOSTO</option>
                    <option value="09">SETEMBRO</option><option value="10">OUTUBRO</option>
                    <option value="11">NOVEMBRO</option><option value="12">DEZEMBRO</option>
                </select>
                <select id="filtroLocal">
                    <option value="TODOS">TODAS AS UNIDADES</option>
                    <option value="MATRIZ">MATRIZ</option><option value="TOLEDO">TOLEDO</option>
                    <option value="ARAGUAINA">ARAGUAINA</option><option value="BOM DESPACHO">BOM DESPACHO</option>
                    <option value="GOIANIRA">GOIANIRA</option><option value="NOVA PONTE">NOVA PONTE</option>
                    <option value="PINHAIS">PINHAIS</option>
                </select>
            </div>
            <div class="inputs-linha">
                <select id="tipoInput"><option value="SERVICO">SERVIÇO</option><option value="PRODUTO">PRODUTO</option></select>
                <select id="localInput">
                    <option value="MATRIZ">MATRIZ</option><option value="TOLEDO">TOLEDO</option>
                    <option value="ARAGUAINA">ARAGUAINA</option><option value="BOM DESPACHO">BOM DESPACHO</option>
                    <option value="GOIANIRA">GOIANIRA</option><option value="NOVA PONTE">NOVA PONTE</option>
                    <option value="PINHAIS">PINHAIS</option>
                </select>
                <input id="pedido" placeholder="Nº Pedido">
                <input id="fornecedor" placeholder="Fornecedor">
                <input id="valor" placeholder="Valor (0,00)">
                <input id="vencimento" placeholder="Venc. (DD/MM/AAAA)">
                <select id="pagamentoInput">
                    <option value="BOLETO">BOLETO</option>
                    <option value="DEPOSITO">DEPÓSITO</option>
                </select>
                <button id="btnLancar">LANÇAR</button>
            </div>
        </div>

        <div class="tabela-box">
            <h2 class="label-prod">PRODUTOS</h2>
            <table>
                <thead><tr><th>LOCAL</th><th>PEDIDO</th><th>FORNECEDOR</th><th>VALOR</th><th>VENC.</th><th>PGTO</th><th>STATUS</th><th>AÇÕES</th></tr></thead>
                <tbody id="tabelaProduto"></tbody>
            </table>
        </div>

        <div class="tabela-box">
            <h2 class="label-serv">SERVIÇOS</h2>
            <table>
                <thead><tr><th>LOCAL</th><th>PEDIDO</th><th>FORNECEDOR</th><th>VALOR</th><th>VENC.</th><th>PGTO</th><th>STATUS</th><th>AÇÕES</th></tr></thead>
                <tbody id="tabelaServico"></tbody>
            </table>
        </div>
    </div>
    <script type="module" src="app.js"></script>
    <script>function fecharModal(){ document.getElementById('modalTratar').style.display='none'; }</script>
</body>
</html>
