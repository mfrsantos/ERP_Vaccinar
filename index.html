<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Green Tech V42.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: #10b981">ERP GREEN</h2>
            <p style="font-size: 12px; color: #9ca3af">Acesso Restrito</p>
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnLogin">ENTRAR</button>
            <p id="loginError" style="color: #ef4444; font-size: 11px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <header>
            <span>⚡ ERP GREEN - V42.0</span>
            <button id="btnLogout" style="background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 5px 10px; border-radius: 4px;">SAIR</button>
        </header>

        <div class="container">
            <div class="grid">
                <div class="card" style="border-left-color: #ef4444;"><p id="totalPendente">R$ 0,00</p><h3>Pendente</h3></div>
                <div class="card" style="border-left-color: #10b981;"><p id="totalPago">R$ 0,00</p><h3>No CSC</h3></div>
                <div class="card" style="border-left-color: #3b82f6;"><p id="totalGeral">R$ 0,00</p><h3>Geral</h3></div>
            </div>

            <div class="area">
                <select id="mesFiltro">
                    <option value="01">JANEIRO</option><option value="02">FEVEREIRO</option>
                    <option value="03" selected>MARÇO</option><option value="04">ABRIL</option>
                </select>
                <select id="filtroLocal">
                    <option value="TODOS">TODOS OS LOCAIS</option>
                    <option value="MATRIZ">MATRIZ</option><option value="BOM DESPACHO">BOM DESPACHO</option>
                </select>
                <button id="btnBackup" style="background: #8b5cf6; color: white;">Download Backup</button>
            </div>

            <div class="area" style="display: flex; flex-wrap: wrap; gap: 10px;">
                <select id="tipoInput"><option value="SERVICO">SERVIÇO</option><option value="PRODUTO">PRODUTO</option></select>
                <input id="localInput" placeholder="Local (Ex: Matriz)">
                <input id="pedidoInput" placeholder="Nº Pedido">
                <input id="fornecedorInput" placeholder="Fornecedor">
                <input id="valorInput" placeholder="Valor (R$)">
                <input id="vencimentoInput" placeholder="Vencimento">
                <button id="btnLancar">Lançar Novo</button>
            </div>

            <div class="area">
                <table>
                    <thead>
                        <tr><th>LOCAL</th><th>PEDIDO</th><th>FORNECEDOR</th><th>VALOR</th><th>VENC.</th><th>STATUS</th><th>AÇÕES</th></tr>
                    </thead>
                    <tbody id="tabelaDados"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
