<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Vaccinar - TI Blue & Green</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loginOverlay" class="overlay">
        <div class="login-box">
            <h2>ERP VACCINAR TI</h2>
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnLogin">ACESSAR SISTEMA</button>
        </div>
    </div>

    <div id="appContent" style="display:none;">
        <header>
            <div class="header-top">
                <h1>ERP <span class="accent-green">VACCINAR</span> <span class="accent-blue">TI</span></h1>
                <button id="btnLogout" class="btn-logout">Sair</button>
            </div>
            
            <div class="filtros-topo">
                <select id="mesFiltro">
                    <option value="JANEIRO">JANEIRO</option><option value="FEVEREIRO">FEVEREIRO</option>
                    <option value="MARCO">MARÇO</option><option value="ABRIL">ABRIL</option>
                    <option value="MAIO">MAIO</option><option value="JUNHO">JUNHO</option>
                    <option value="JULHO">JULHO</option><option value="AGOSTO">AGOSTO</option>
                    <option value="SETEMBRO">SETEMBRO</option><option value="OUTUBRO">OUTUBRO</option>
                    <option value="NOVEMBRO">NOVEMBRO</option><option value="DEZEMBRO">DEZEMBRO</option>
                </select>

                <select id="filtroLocal">
                    <option value="TODOS">TODAS FILIAIS</option>
                    <option value="MATRIZ">MATRIZ</option>
                    <option value="ARAGUAINA">ARAGUAINA</option>
                    <option value="GOIANIRA">GOIANIRA</option>
                    <option value="BOM DESPACHO">BOM DESPACHO</option>
                    <option value="TOLEDO">TOLEDO</option>
                    <option value="PINHAIS">PINHAIS</option>
                    <option value="NOVA PONTE">NOVA PONTE</option>
                </select>

                <input type="text" id="inputBusca" placeholder="Buscar por pedido ou fornecedor...">
                <button id="btnAprovacao" class="btn-aprovacao"><i class="fas fa-check-double"></i> Aprovação > 10k</button>
            </div>
        </header>

        <main>
            <div class="card-lancamento">
                <h3><i class="fas fa-plus-circle"></i> Novo Lançamento</h3>
                <div class="form-grid">
                    <select id="mTipo"><option value="SERVICO">SERVIÇO</option><option value="PRODUTO">PRODUTO</option></select>
                    <select id="mLocal">
                        <option value="MATRIZ">MATRIZ</option>
                        <option value="ARAGUAINA">ARAGUAINA</option>
                        <option value="GOIANIRA">GOIANIRA</option>
                        <option value="BOM DESPACHO">BOM DESPACHO</option>
                        <option value="TOLEDO">TOLEDO</option>
                        <option value="PINHAIS">PINHAIS</option>
                        <option value="NOVA PONTE">NOVA PONTE</option>
                    </select>
                    <input type="text" id="mPedido" placeholder="Nº Pedido">
                    <input type="text" id="mCodFor" placeholder="Cód. Forn.">
                    <input type="text" id="mFornecedor" placeholder="Nome Fornecedor">
                    <input type="text" id="mCC" placeholder="Centro de Custo">
                    <input type="number" id="mValor" step="0.01" placeholder="Valor R$">
                    <input type="text" id="mVenc" placeholder="Vencimento">
                    <select id="mPagamento">
                        <option value="BOLETO">BOLETO</option>
                        <option value="DEPOSITO">DEPOSITO</option>
                    </select>
                    <button id="btnSalvarManual" class="btn-salvar">SALVAR</button>
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat-item"><span>Pendente:</span> <b id="totalPendente">R$ 0,00</b> <small id="countPendente"></small></div>
                <div class="stat-item"><span>Enviado:</span> <b id="totalEnviado">R$ 0,00</b> <small id="countEnviado"></small></div>
            </div>

            <div class="container-tabela">
                <h2 class="accent-blue"><i class="fas fa-tools"></i> Notas de Serviço</h2>
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>Filial</th><th>Nº PC</th><th>Fornecedor</th><th>C.C</th><th>Valor</th><th>Venc.</th><th>Pagto</th><th>Status</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaServico"></tbody>
                    </table>
                </div>
            </div>

            <div class="container-tabela">
                <h2 class="accent-green"><i class="fas fa-shopping-cart"></i> Notas de Produto</h2>
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>Filial</th><th>Nº PC</th><th>Fornecedor</th><th>Valor</th><th>Venc.</th><th>Pagto</th><th>Status</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaProduto"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modalApp" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Tratamento de Nota</h3>
            <div id="modalPreview" class="preview-box"></div>
            <div id="modalActions" class="modal-actions-container"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
