<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Green Tech V51.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: #10b981">ERP GREEN</h2>
            <input id="loginEmail" type="email" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnLogin">ENTRAR</button>
        </div>
    </div>

    <div id="modalTratar" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#10b981">Tratar Lançamento</h3>
            <div id="modalPreview" class="preview-box"></div>
            <div class="modal-actions-list">
                <button id="btnAcaoPrincipal" class="btn-modal-main">ENVIAR/COPIAR</button>
                <button id="btnApenasMarcar" class="btn-modal-sec">APENAS MARCAR COMO ENVIADO</button>
                <button onclick="fecharModal()" class="btn-modal-cancel">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <header class="main-header">
            <div class="header-left">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <h1>ERP - MS INFORMÁTICA</h1>
            </div>
            <button id="btnLogout" class="btn-logout">SAIR</button>
        </header>

        <div class="container-fluid">
            <div class="grid-resumo">
                <div class="card-v37 orange"><h3>NOTAS ENVIADAS</h3><p id="progressoNotas">0 / 0</p></div>
                <div class="card-v37 red"><h3>TOTAL PENDENTE</h3><p id="totalPendente">R$ 0,00</p></div>
                <div class="card-v37 green"><h3>TOTAL NO CSC</h3><p id="totalPago">R$ 0,00</p></div>
                <div class="card-v37 blue"><h3>TOTAL GERAL</h3><p id="totalGeral">R$ 0,00</p></div>
            </div>

            <div class="area section-controls">
                <div class="row-top">
                    <div class="group">
                        <label>MÊS REFERÊNCIA</label>
                        <select id="mesFiltro">
                            <option value="01">JANEIRO</option><option value="02">FEVEREIRO</option>
                            <option value="03" selected>MARÇO</option><option value="04">ABRIL</option>
                            <option value="05">MAIO</option><option value="06">JUNHO</option>
                            <option value="07">JULHO</option><option value="08">AGOSTO</option>
                            <option value="09">SETEMBRO</option><option value="10">OUTUBRO</option>
                            <option value="11">NOVEMBRO</option><option value="12">DEZEMBRO</option>
                        </select>
                    </div>
                    <div class="group">
                        <label>FILTRAR UNIDADE</label>
                        <select id="filtroLocal">
                            <option value="TODOS">TODAS AS UNIDADES</option>
                            <option value="MATRIZ">MATRIZ</option><option value="ARAGUAINA">ARAGUAINA</option>
                            <option value="BOM DESPACHO">BOM DESPACHO</option><option value="GOIANIRA">GOIANIRA</option>
                            <option value="NOVA PONTE">NOVA PONTE</option><option value="PINHAIS">PINHAIS</option><option value="TOLEDO">TOLEDO</option>
                        </select>
                    </div>
                    <div class="group" style="justify-content: flex-end; flex: 1; display: flex; align-items: flex-end;">
                        <button id="btnImportarJSON" class="btn-json-blue"><i class="fas fa-file-import"></i> IMPORTAR CSV</button>
                        <input type="file" id="inputImportarJSON" style="display:none" accept=".csv">
                    </div>
                </div>

                <div class="row-lancamento">
                    <select id="tipoInput"><option value="SERVICO">SERVIÇO</option><option value="PRODUTO">PRODUTO</option></select>
                    <select id="localInput">
                        <option value="" disabled selected>Local</option>
                        <option value="MATRIZ">MATRIZ</option><option value="ARAGUAINA">ARAGUAINA</option>
                        <option value="BOM DESPACHO">BOM DESPACHO</option><option value="GOIANIRA">GOIANIRA</option>
                        <option value="NOVA PONTE">NOVA PONTE</option><option value="PINHAIS">PINHAIS</option><option value="TOLEDO">TOLEDO</option>
                    </select>
                    <input id="pedido" placeholder="Nº Pedido">
                    <input id="codFornecedor" placeholder="Cód. Forn.">
                    <input id="fornecedor" placeholder="Fornecedor">
                    <input id="valor" placeholder="Valor (0,00)">
                    <input id="cc" placeholder="C. Custo">
                    <input id="vencimento" placeholder="Vencimento">
                    <button id="btnLancar" class="btn-lancar">LANÇAR</button>
                </div>
            </div>

            <div class="area">
                <h2 class="table-header prod"><span>PRODUTOS</span></h2>
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr><th>LOCAL</th><th>PEDIDO (✎)</th><th>FORNECEDOR</th><th>VALOR (✎)</th><th>C/C</th><th>VENC. (✎)</th><th>STATUS</th><th>AÇÕES</th></tr>
                        </thead>
                        <tbody id="tabelaProduto"></tbody>
                    </table>
                </div>
            </div>

            <div class="area">
                <h2 class="table-header serv"><span>SERVIÇOS</span></h2>
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr><th>LOCAL</th><th>PEDIDO (✎)</th><th>FORNECEDOR</th><th>VALOR (✎)</th><th>C/C</th><th>VENC. (✎)</th><th>STATUS</th><th>AÇÕES</th></tr>
                        </thead>
                        <tbody id="tabelaServico"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
    <script>function fecharModal(){ document.getElementById('modalTratar').style.display='none'; }</script>
</body>
</html>
