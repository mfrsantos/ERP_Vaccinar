<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ERP - MS Informática</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="modalTratar" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 style="color: var(--accent-green)">Tratar Lançamento</h3>
            <div id="modalPreview" class="preview-box"></div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button id="btnAcaoPrincipal" class="btn-lancar">ENVIAR/COPIAR</button>
                <button id="btnApenasMarcar" style="background:#475569" class="btn-lancar">APENAS MARCAR</button>
                <button onclick="fecharModal()" style="background:transparent; border:1px solid #334155" class="btn-lancar">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="appContent">
        <header class="main-header">
            <h1>ERP - MS INFORMÁTICA</h1>
            <button id="btnLogout" style="background:#ef4444" class="btn-lancar">SAIR</button>
        </header>

        <div class="grid-resumo">
            <div class="card-v37 orange"><h3>NOTAS ENVIADAS</h3><p id="progressoNotas">0 / 0</p></div>
            <div class="card-v37 red"><h3>TOTAL PENDENTE</h3><p id="totalPendente">R$ 0,00</p></div>
            <div class="card-v37 green"><h3>TOTAL NO CSC</h3><p id="totalPago">R$ 0,00</p></div>
            <div class="card-v37 blue"><h3>TOTAL GERAL</h3><p id="totalGeral">R$ 0,00</p></div>
        </div>

        <div class="area">
            <div class="row-lancamento">
                <select id="mesFiltro">
                    <option value="01">JANEIRO</option><option value="02">FEVEREIRO</option>
                    <option value="03">MARÇO</option><option value="04">ABRIL</option>
                    <option value="05">MAIO</option><option value="06">JUNHO</option>
                    <option value="07">JULHO</option><option value="08">AGOSTO</option>
                    <option value="09">SETEMBRO</option><option value="10">OUTUBRO</option>
                    <option value="11">NOVEMBRO</option><option value="12">DEZEMBRO</option>
                </select>
                <select id="tipoInput"><option value="SERVICO">SERVIÇO</option><option value="PRODUTO">PRODUTO</option></select>
                <input id="pedido" placeholder="Pedido">
                <input id="fornecedor" placeholder="Fornecedor">
                <input id="valor" placeholder="Valor">
                <input id="vencimento" placeholder="Vencimento">
                <select id="pagamentoInput"><option value="BOLETO">BOLETO</option><option value="DEPOSITO">DEPOSITO</option></select>
                <button id="btnLancar" class="btn-lancar">LANÇAR</button>
            </div>
        </div>

        <div class="area">
            <h2 style="color:var(--accent-orange); font-size:14px">PRODUTOS</h2>
            <table>
                <thead>
                    <tr><th>LOCAL</th><th>PEDIDO</th><th>FORNECEDOR</th><th>VALOR</th><th>VENC.</th><th>STATUS</th><th>AÇÕES</th></tr>
                </thead>
                <tbody id="tabelaProduto"></tbody>
            </table>
        </div>

        <div class="area">
            <h2 style="color:var(--accent-blue); font-size:14px">SERVIÇOS</h2>
            <table>
                <thead>
                    <tr><th>LOCAL</th><th>PEDIDO</th><th>FORNECEDOR</th><th>VALOR</th><th>VENC.</th><th>STATUS</th><th>AÇÕES</th></tr>
                </thead>
                <tbody id="tabelaServico"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>function fecharModal(){ document.getElementById('modalTratar').style.display='none'; }</script>
</body>
</html>
