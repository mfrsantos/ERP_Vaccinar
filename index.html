<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Green Tech V42.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: #10b981">ERP GREEN</h2>
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnLogin">ENTRAR</button>
            <p id="loginError" style="color: #ef4444; font-size: 11px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <header>
            <span>⚡ ERP GREEN - CLOUD</span>
            <button id="btnLogout">SAIR</button>
        </header>

        <div class="container">
            <div class="grid">
                <div class="card card-pendente"><p id="totalPendente">R$ 0,00</p><h3>Pendente</h3></div>
                <div class="card card-csc"><p id="totalPago">R$ 0,00</p><h3>No CSC</h3></div>
                <div class="card card-geral"><p id="totalGeral">R$ 0,00</p><h3>Geral</h3></div>
            </div>

            <div class="area">
                <select id="mesFiltro">
                    <option value="01">JANEIRO</option><option value="02">FEVEREIRO</option>
                    <option value="03" selected>MARÇO</option><option value="04">ABRIL</option>
                    <option value="05">MAIO</option><option value="06">JUNHO</option>
                    <option value="07">JULHO</option><option value="08">AGOSTO</option>
                    <option value="09">SETEMBRO</option><option value="10">OUTUBRO</option>
                    <option value="11">NOVEMBRO</option><option value="12">DEZEMBRO</option>
                </select>

                <select id="filtroLocal">
                    <option value="TODOS">TODAS AS UNIDADES</option>
                    <option value="MATRIZ">MATRIZ</option><option value="ARAGUAINA">ARAGUAINA</option>
                    <option value="BOM DESPACHO">BOM DESPACHO</option><option value="GOIANIRA">GOIANIRA</option>
                    <option value="NOVA PONTE">NOVA PONTE</option><option value="PINHAIS">PINHAIS</option>
                    <option value="TOLEDO">TOLEDO</option>
                </select>
                <button id="btnBackup" style="background: #8b5cf6; color: white;">Download Backup</button>
            </div>

            <div class="area cadastro-grid">
                <select id="tipoInput"><option value="SERVICO">SERVIÇO</option><option value="PRODUTO">PRODUTO</option></select>
                
                <select id="localInput">
                    <option value="MATRIZ">MATRIZ</option><option value="ARAGUAINA">ARAGUAINA</option>
                    <option value="BOM DESPACHO">BOM DESPACHO</option><option value="GOIANIRA">GOIANIRA</option>
                    <option value="NOVA PONTE">NOVA PONTE</option><option value="PINHAIS">PINHAIS</option>
                    <option value="TOLEDO">TOLEDO</option>
                </select>

                <input id="pedidoInput" placeholder="Nº Pedido">
                <input id="fornecedorInput" placeholder="Fornecedor">
                <input id="valorInput" placeholder="Valor (R$)">
                <input id="vencimentoInput" type="text" placeholder="Vencimento">
                <button id="btnLancar">Lançar Novo</button>
            </div>

            <div class="area">
                <table>
                    <thead>
                        <tr><th>LOCAL</th><th>PEDIDO</th><th>FORNECEDOR</th><th>VALOR</th><th>VENC.</th><th>STATUS</th><th>AÇÕES</th></tr>
                    </thead>
                    <tbody id="tabelaDados"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
