<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Green Tech V51.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: #10b981">ERP GREEN</h2>
            <input id="loginEmail" type="email" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnLogin">ENTRAR</button>
        </div>
    </div>

    <div id="modalTratar" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#10b981">Tratar Lançamento</h3>
            <div id="modalPreview" class="preview-box"></div>
            <div class="modal-actions-list">
                <button id="btnAcaoPrincipal" class="btn-modal-main">ENVIAR/COPIAR</button>
                <button id="btnApenasMarcar" class="btn-modal-sec">APENAS MARCAR</button>
                <button onclick="fecharModal()" class="btn-modal-sec">CANCELAR</button>
            </div>
        </div>
    </div>

    <div class="main-header">
        <h1>ERP GREEN TECH <span id="statusUser" style="font-size:10px; color:#666"></span></h1>
        <button id="btnLogout" style="background:none; border:1px solid #333; color:#666; cursor:pointer; padding:5px 10px; border-radius:4px">SAIR</button>
    </div>

    <div class="container-fluid">
        <div class="card-v37" style="margin-bottom: 20px; border-left-color: #10b981;">
            <div class="form-lancar">
                <select id="local">
                    <option value="MATRIZ">MATRIZ</option>
                    <option value="PINHAIS">PINHAIS</option>
                    <option value="TOLEDO">TOLEDO</option>
                    <option value="GOIANIRA">GOIANIRA</option>
                    <option value="ARAGUAINA">ARAGUAINA</option>
                    <option value="BOM DESPACHO">BOM DESPACHO</option>
                    <option value="NOVA PONTE">NOVA PONTE</option>
                </select>
                <input id="pedido" placeholder="Nº Pedido">
                <input id="fornecedor" placeholder="Fornecedor">
                <input id="valor" placeholder="Valor">
                <input id="vencimento" placeholder="Vencimento">
                <button id="btnLancar" class="btn-lancar">LANÇAR</button>
                
                <input type="file" id="importarCSV" accept=".csv" style="display: none;">
                <button onclick="document.getElementById('importarCSV').click()" class="btn-lancar" style="background: #3b82f6;">
                    <i class="fas fa-file-csv"></i> IMPORTAR CSV
                </button>
            </div>
        </div>

        <div class="area">
            <h2 class="table-header serv"><span>SERVIÇOS (ABRIL 2026)</span></h2>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr><th>LOCAL</th><th>PEDIDO (PC)</th><th>FORNECEDOR</th><th>VALOR</th><th>C/C</th><th>VENC.</th><th>STATUS</th><th>AÇÕES</th></tr>
                    </thead>
                    <tbody id="tabelaServico"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
    <script>function fecharModal(){ document.getElementById('modalTratar').style.display='none'; }</script>
</body>
</html>
