<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Green Tech V51.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: #10b981; margin-bottom: 20px;">ERP GREEN</h2>
            <input id="loginEmail" type="email" placeholder="E-mail">
            <input id="loginPass" type="password" placeholder="Senha">
            <button id="btnLogin">ENTRAR</button>
            <p id="loginError"></p>
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <header class="main-header">
            <div class="header-left">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <div class="logo-text">
                    <h1>ERP GREEN</h1>
                    <span>FINANCEIRO V51.0</span>
                </div>
            </div>
            <button id="btnLogout"><i class="fas fa-sign-out-alt"></i> SAIR</button>
        </header>

        <div class="container">
            <div class="grid">
                <div class="card card-pendente"><p id="totalPendente">R$ 0,00</p><h3>Pendente</h3></div>
                <div class="card card-csc"><p id="totalPago">R$ 0,00</p><h3>No CSC</h3></div>
                <div class="card card-geral"><p id="totalGeral">R$ 0,00</p><h3>Geral</h3></div>
            </div>

            <div class="area actions-bar">
                <div class="filters">
                    <select id="mesFiltro">
                        <option value="01">JANEIRO</option><option value="02">FEVEREIRO</option>
                        <option value="03">MARÇO</option><option value="04">ABRIL</option>
                        <option value="05">MAIO</option><option value="06">JUNHO</option>
                        <option value="07">JULHO</option><option value="08">AGOSTO</option>
                        <option value="09">SETEMBRO</option><option value="10">OUTUBRO</option>
                        <option value="11">NOVEMBRO</option><option value="12">DEZEMBRO</option>
                    </select>
                </div>
                <div class="buttons-group">
                    <input type="file" id="inputImportarJSON" style="display:none" accept=".json">
                    <button id="btnImportar" class="btn-primary"><i class="fas fa-file-import"></i> Importar JSON</button>
                </div>
            </div>

            <div class="area">
                <table>
                    <thead>
                        <tr><th>LOCAL</th><th>PEDIDO (✎)</th><th>FORNECEDOR</th><th>VALOR (✎)</th><th>VENC. (✎)</th><th>AÇÕES</th></tr>
                    </thead>
                    <tbody id="tabelaDados"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
