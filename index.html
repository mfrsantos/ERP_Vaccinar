<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Green Tech V50.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: #10b981">ERP GREEN</h2>
            <input id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnLogin">ENTRAR</button>
            <p id="loginError" style="color: #ef4444; font-size: 11px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="modalEnvio" class="modal">
        <div class="modal-content">
            <h3 id="modalTitulo" style="color: #10b981; margin-top: 0;">Tratar Lançamento</h3>
            <div id="previewTexto" class="preview-box"></div>
            <div id="botoesAcao" class="modal-actions"></div>
            <button onclick="document.getElementById('modalEnvio').style.display='none'" class="btn-fechar">Cancelar</button>
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <header>
            <span>⚡ ERP GREEN - V50.0</span>
            <button id="btnLogout">SAIR</button>
        </header>

        <div class="container">
            <div class="grid">
                <div class="card card-pendente"><p id="totalPendente">R$ 0,00</p><h3>Pendente</h3></div>
                <div class="card card-csc"><p id="totalPago">R$ 0,00</p><h3>No CSC</h3></div>
                <div class="card card-geral"><p id="totalGeral">R$ 0,00</p><h3>Geral</h3></div>
            </div>

            <div class="area">
                <select id="mesFiltro">
                    <option value="01">JANEIRO</option><option value="02">FEVEREIRO</option>
                    <option value="03" selected>MARÇO</option><option value="04">ABRIL</option>
                    <option value="05">MAIO</option><option value="06">JUNHO</option>
                    <option value="07">JULHO</option><option value="08">AGOSTO</option>
                    <option value="09">SETEMBRO</option><option value="10">OUTUBRO</option>
                    <option value="11">NOVEMBRO</option><option value="12">DEZEMBRO</option>
                </select>
                <select id="filtroLocal">
                    <option value="TODOS">TODAS AS UNIDADES</option>
                    <option value="MATRIZ">MATRIZ</option><option value="ARAGUAINA">ARAGUAINA</option>
                    <option value="BOM DESPACHO">BOM DESPACHO</option><option value="GOIANIRA">GOIANIRA</option>
                    <option value="NOVA PONTE">NOVA PONTE</option><option value="PINHAIS">PINHAIS</option>
                    <option value="TOLEDO">TOLEDO</option>
                </select>
                <button id="btnBackup" style="background: #8b5cf6; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer;">Backup JSON</button>
                
                <input type="file" id="inputImportarJSON" style="display:none" accept=".json">
                <button id="btnImportar" style="background: #10b981; color: #000; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 10px;">
                    📥 Importar JSON
                </button>
            </div>

            <div class="area cadastro-grid">
                <select id="tipoInput"><option value="SERVICO">SERVIÇO</option><option value="PRODUTO">PRODUTO</option></select>
                <select id="localInput">
                    <option value="MATRIZ">MATRIZ</option><option value="ARAGUAINA">ARAGUAINA</option>
                    <option value="BOM DESPACHO">BOM DESPACHO</option><option value="GOIANIRA">GOIANIRA</option>
                    <option value="NOVA PONTE">NOVA PONTE</option><option value="PINHAIS">PINHAIS</option>
                    <option value="TOLEDO">TOLEDO</option>
                </select>
                <input id="pedidoInput" placeholder="Nº Pedido">
                <input id="codFornecedorInput" placeholder="Cód. Fornecedor" style="width: 130px;" inputmode="numeric">
                <input id="fornecedorInput" placeholder="Fornecedor">
                <input id="valorInput" placeholder="Valor R$">
                <input id="ccInput" placeholder="C/C" style="width: 160px;">
                <input id="vencimentoInput" placeholder="Vencimento">
                <select id="pagamentoInput">
                    <option value="BOLETO">BOLETO</option>
                    <option value="DEPOSITO">DEPÓSITO</option>
                </select>
                <button id="btnLancar">Lançar Novo</button>
            </div>

            <div class="area">
                <h2 style="color: #10b981; font-size: 14px; margin-bottom: 15px;">NOTAS DE SERVIÇO</h2>
                <table>
                    <thead>
                        <tr><th>LOCAL</th><th>PEDIDO (✎)</th><th>CÓD.</th><th>FORNECEDOR</th><th>VALOR (✎)</th><th>C/C</th><th>VENC.</th><th>AÇÕES</th></tr>
                    </thead>
                    <tbody id="tabelaServico"></tbody>
                </table>
            </div>

            <div class="area">
                <h2 style="color: #3b82f6; font-size: 14px; margin-bottom: 15px;">NOTAS DE PRODUTO</h2>
                <table>
                    <thead>
                        <tr><th>LOCAL</th><th>PEDIDO (✎)</th><th>CÓD.</th><th>FORNECEDOR</th><th>VALOR (✎)</th><th>C/C</th><th>VENC.</th><th>AÇÕES</th></tr>
                    </thead>
                    <tbody id="tabelaProduto"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
